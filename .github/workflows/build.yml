name: Build FolkPatch

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type == 'release' && 'Release' || 'Debug' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-build-env

      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: |
          # Generate debug keystore for release build if no keystore secret is available
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            keytool -genkeypair -v -keystore release.keystore \
              -alias releasekey -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=SOLO, OU=Dev, O=SOLO, L=Unknown, ST=Unknown, C=US"
            cat > keystore.properties << EOF
            KEYSTORE_FILE=../release.keystore
            KEYSTORE_PASSWORD=android
            KEY_ALIAS=releasekey
            KEY_PASSWORD=android
            EOF
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > FolkPatch.jks
            cat > keystore.properties << EOF
            KEYSTORE_FILE=../FolkPatch.jks
            KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
            KEY_ALIAS=${{ secrets.KEY_ALIAS }}
            KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
            EOF
          fi
          ./gradlew assembleRelease --no-daemon

      - name: Find and rename APK
        run: |
          SHORT="${GITHUB_SHA::7}"
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            APK=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -1)
            [ -n "$APK" ] && mv "$APK" "FolkPatch-Release-${SHORT}.apk"
          else
            APK=$(find app/build/outputs/apk/debug -name "*.apk" -type f | head -1)
            [ -n "$APK" ] && mv "$APK" "FolkPatch-Debug-${SHORT}.apk"
          fi
          echo "APK files:"
          find . -maxdepth 1 -name "FolkPatch-*.apk" -type f || echo "No APK found"

      - uses: actions/upload-artifact@v4
        with:
          name: folkpatch-${{ github.sha }}
          path: FolkPatch-*.apk
          retention-days: 30
